# Avellaneda-Stoikov strategy parameters (conservative for testnet)
avellaneda:
  risk_factor: 1.0
  order_amount_shape_factor: 0.0
  min_spread: 0.0
  order_refresh_time: 10.0
  max_order_age: 1800.0
  order_refresh_tolerance_pct: 0.0
  filled_order_delay: 60.0
  inventory_target_base_pct: 50.0
  add_transaction_costs: false
  volatility_buffer_size: 200
  trading_intensity_buffer_size: 200
  order_optimization_enabled: true
  order_levels: 1
  hanging_orders_enabled: false
  should_wait_order_cancel_confirmation: true
  execution_timeframe_mode: "infinite"
  volatility_min_samples: 10
  default_volatility: 5.0
  min_volatility: 1.0
  max_spread: 20.0
  stream_volatility_lookback_days: 14
  stream_volatility_min: 0.01
  time_horizon: 1.0

# Polling intervals
order_book_poll_interval: 5.0
inventory_refresh_interval: 30.0

# Operational settings
dry_run: false
debug: false
cancel_open_orders_on_exit: true
order_state_file: "bot_order_state.json"
